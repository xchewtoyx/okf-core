name: Test

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e ".[test,dev]"

      - name: Check code formatting (Black)
        run: black --check src tests

      - name: Lint code and scripts (ruff + mypy)
        run: |
          python -m ruff check src tests .github/scripts/
          python -m mypy src tests .github/scripts/ --ignore-missing-imports

      - name: Lint workflows (actionlint)
        uses: rhysd/action-actionlint@v1

  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e ".[test]"

      - name: Run tests
        run: pytest
